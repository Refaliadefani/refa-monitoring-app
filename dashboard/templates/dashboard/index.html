<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 0; border-radius: 0 0 30px 30px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="status-header text-center">
        <h1>💻 Server Health Monitor</h1>
        <p>Real-time data from your local machine</p>
    </div>

    <div class="container">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5 class="text-muted">CPU Usage</h5>
                    <h2 class="display-5 fw-bold text-primary">{{ cpu }}%</h2>
                    <div class="progress mt-3">
                        <div class="progress-bar" role="progressbar" style="width: {{ cpu }}%"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5 class="text-muted">RAM Usage</h5>
                    <h2 class="display-5 fw-bold text-success">{{ ram }}%</h2>
                    <div class="progress mt-3">
                        <div class="progress-bar bg-success" role="progressbar" style="width: {{ ram }}%"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h5 class="text-muted">Free Storage (C:)</h5>
                    <h2 class="display-5 fw-bold text-info">{{ storage }} GB</h2>
                    <p class="mt-3 text-muted">Keep it safe, Bestie! 💅</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
